name: Tombamento develop -> release (reset total)

on:
  schedule:
    - cron: "0 9 1,15 * *"   # roda a cada 15 dias
  workflow_dispatch:         # execução manual
  push:
    branches: ["develop"]

jobs:
  tombamento:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset release para develop
        run: |
          DATE=$(date +'%Y.%m.%d')
          git fetch origin develop
          git checkout develop
          git pull origin develop
          git fetch origin release
          git checkout release
          git reset --hard develop
          git add .
          git commit -m "Tobamento total da branch develop para release em $DATE"
          git push origin release --force

      - name: Criar tag de release
        run: |
          DATE=$(date +'%Y.%m.%d')
          git tag -a "release-$DATE" -m "Release quinzenal (reset develop -> release em $DATE)"
          git push origin "release-$DATE"