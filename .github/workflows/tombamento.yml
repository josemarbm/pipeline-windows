name: Tombamento develop -> release (reset total)

on:
  schedule:
    - cron: "0 9 1,15 * *"   # roda a cada 15 dias
  workflow_dispatch:         # execução manual
  push:
    branches: ["develop"]

jobs:
  tombamento:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset release para develop
        run: |
          git fetch origin develop
          git checkout develop
          git pull origin develop
          git fetch origin release
          git checkout release
          git reset --hard develop
          git push origin release --force

      # verifica se tag ja existe
      - name: Verificar se tag ja existe
        id: check_tag
        run: |
          if git describe --tags --exact "release-$(date +'%Y.%m.%d')" &> /dev/null; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Criar tag de release
        if: steps.check_tag.outputs.tag_exists != 'true'
        run: |
          DATE=$(date +'%Y.%m.%d')
          git tag -a "release-$DATE" -m "Release quinzenal (reset develop -> release em $DATE)"
          git push origin "release-$DATE"