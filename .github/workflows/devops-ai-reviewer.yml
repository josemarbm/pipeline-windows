name: DevOps AI Reviewer

on:
  workflow_run:
    workflows: ["CI-CD-HelloWorld"] # Target workflow to monitor
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  analyze_failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências (Agente)
        run: pip install -r scripts/requirements.txt
        
      - name: Download Failed Job Logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Buscando logs do workflow fallho (Run ID: ${{ github.event.workflow_run.id }})..."
          gh run view ${{ github.event.workflow_run.id }} --log-failed > error_log.txt || true
          
      - name: Analisar Erro com DevOps AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/devops_agent.py --log-file error_log.txt
